apis:
  - name: aWATTar Market Data API
    description: >-
      RESTful API providing hourly EPEX Spot electricity market prices for
      Austria and Germany. Returns JSON data with start/end timestamps and
      market price in EUR/MWh. Supports optional start and end parameters
      (epoch milliseconds) to filter the time range. No authentication required.
      Updated daily at 14:00 CET for the next 24 hours. Available for both
      Austria (api.awattar.at) and Germany (api.awattar.de).
