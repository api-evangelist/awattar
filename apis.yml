name: aWATTar
description: >-
  aWATTar provides a free, public REST API delivering real-time and next-day
  hourly electricity spot prices sourced from the EPEX Spot market exchange for
  both Austria and Germany. The API enables developers, smart home integrators,
  and commercial operators to build dynamic energy pricing applications that
  respond to market conditions. Prices are updated daily at 14:00 CET covering
  the following day, and the API returns JSON data including start/end
  timestamps and market price per MWh. No authentication token is required,
  making integration straightforward for any developer. The service is offered
  free of charge under a fair-use policy of 100 requests per day per client,
  supporting use cases such as EV charging optimization, smart heating control,
  and automated energy management systems.
